name: Build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Package VST3
        run: Compress-Archive -Path "build/Carve_artefacts/Release/VST3/JeDEx CARVE.vst3" -DestinationPath "JeDEx-CARVE-VST3-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeDEx-CARVE-Windows-VST3
          path: build/Carve_artefacts/Release/VST3/

      - name: Publish latest release (Windows)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JeDEx CARVE — latest build"
          files: JeDEx-CARVE-VST3-Windows.zip
          make_latest: true

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      # Validate on real Apple hardware — the strongest confidence short of owning a Mac.
      # auval is Apple's own tool and is exactly what Logic and GarageBand run before they
      # will load an Audio Unit; a pass here means Logic will accept the plug-in.
      - name: Validate Audio Unit (auval)
        run: |
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -R "build/Carve_artefacts/Release/AU/JeDEx CARVE.component" ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          auval -a | grep -i carve || true
          auval -v aufx Crve Jdex

      - name: Validate VST3 + AU (pluginval)
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -q pluginval.zip
          PV="pluginval.app/Contents/MacOS/pluginval"
          "$PV" --strictness-level 10 --validate "build/Carve_artefacts/Release/VST3/JeDEx CARVE.vst3"
          "$PV" --strictness-level 10 --validate "build/Carve_artefacts/Release/AU/JeDEx CARVE.component"

      # Universal AU (.component) and VST3 (.vst3) for Logic/GarageBand and every VST3 host.
      - name: Package macOS
        run: |
          mkdir -p out
          cp -R "build/Carve_artefacts/Release/AU/JeDEx CARVE.component" out/ 2>/dev/null || true
          cp -R "build/Carve_artefacts/Release/VST3/JeDEx CARVE.vst3" out/ 2>/dev/null || true
          cd out && zip -r -y ../JeDEx-CARVE-macOS.zip . && cd ..
          echo "--- built bundles:" && ls -la out
          echo "--- architectures:" && lipo -info "out/JeDEx CARVE.vst3/Contents/MacOS/JeDEx CARVE" || true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeDEx-CARVE-macOS-AU-VST3
          path: out/

      - name: Publish latest release (macOS)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JeDEx CARVE — latest build"
          files: JeDEx-CARVE-macOS.zip
          make_latest: true
