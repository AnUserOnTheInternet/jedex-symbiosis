name: Build VST3

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Package VST3
        run: Compress-Archive -Path "build/Carve_artefacts/Release/VST3/JeDEx CARVE.vst3" -DestinationPath "JeDEx-CARVE-VST3.zip"

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: JeDEx-CARVE-VST3-Windows
          path: build/Carve_artefacts/Release/VST3/

      # Publish/refresh a "latest" release so the zip is downloadable
      # without any GitHub authentication.
      - name: Publish latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JeDEx CARVE — latest build"
          files: JeDEx-CARVE-VST3.zip
          make_latest: true
